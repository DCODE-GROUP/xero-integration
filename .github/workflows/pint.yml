name: Fix PHP code style issues

on:
  workflow_call:

permissions:
  contents: write

jobs:
  php-code-styling:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Fix PHP code style issues
        uses: aglipanci/laravel-pint-action@2.6
        with:
          testMode: true
